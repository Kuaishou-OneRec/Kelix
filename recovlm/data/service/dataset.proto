syntax = "proto3";

package service;

service DatasetService {
  rpc BalanceSequence (BatchSequenceInfo) returns (SelectedValue) {}
}

message BatchSequenceInfo {
  int32 client_id = 1;
  int64 session_id = 2;
  repeated int32 image_token_len = 3;
}

message SelectedValue {
  int32 client_id = 1;
  int64 session_id = 2;
  int32 selected = 3;
}
