output_dir: viewfs://hadoop-lt-cluster/home/reco_wl/mpi/zhouyang12/web_comment/l1
split_size: 42_000_000
dataset:
  class_name: ParquetDataset
  kwargs:
    path: viewfs://hadoop-lt-cluster/home/reco_kaiworks/users/zhouyang12/data/recovlm/web_comments/p_date=20250328
    columns:
      - note_id
      - note_title
      - note_desc
      - note_type
      - like_count
      - collect_count
      - comment_count
      - share_count
      - video_info
      - image_info
      - topic
      - img_tag
      - hash_tag
      - comments
converter:
  class_name: WebCommentConverter
  kwargs:
    source: web_comment
    prompts:
      - "上面是一个帖子，请你模仿真实用户的口吻，写一条评论。"
      - "阅读这段文字，生成一条评论。"
      - "这是一个帖子，请你针对帖子内容，写一条评论，尽可能地口语化表达。"
      - "现在假设你是某社交媒体的资深用户，当你看到这段文字后，可能会写一条什么样的评论？"
