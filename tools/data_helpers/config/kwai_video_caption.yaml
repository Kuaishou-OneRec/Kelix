output_dir: /llm_reco_ssd/luoxinchen/dataset/kwai_video_caption/20250105
shard_size: 10000
dataset:
  class_name: ParquetDataset
  kwargs:
    path: viewfs://hadoop-lt-cluster/home/reco_kaiworks/dw/reco_kaiworks.db/hot_pid_info
    columns:
      - photo_id
      - caption
converter:
  class_name: KwaiVideoCaptionConverter
  kwargs:
    source: kwai_video_caption
    video_dir: /llm_reco_ssd/luoxinchen/kwai_video/480p_60s_4fps
