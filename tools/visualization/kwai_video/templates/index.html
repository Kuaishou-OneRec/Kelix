<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kwai Video Visualization</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center mb-4">Kwai Video Visualization</h1>
        
        <!-- File Upload Section -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">Load Data</h5>
                <form id="uploadForm">
                    <div class="mb-3">
                        <label for="filePath" class="form-label">File Path</label>
                        <input type="text" class="form-control" id="filePath" placeholder="Enter file path">
                    </div>
                    <div class="mb-3">
                        <label for="loadCount" class="form-label">Number of Items to Load</label>
                        <input type="number" class="form-control" id="loadCount" value="10" min="1">
                    </div>
                    <button type="submit" class="btn btn-primary">Load</button>
                </form>
            </div>
        </div>

        <!-- Content Display Section -->
        <div id="contentSection" style="display: none;">
            <div class="row">
                <div class="col-md-8">
                    <!-- Media Display -->
                    <div class="card mb-4">
                        <div class="card-body">
                            <h5 class="card-title">Media</h5>
                            <div id="mediaContainer" class="text-center">
                                <!-- Video or images will be displayed here -->
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <!-- Responses Display -->
                    <div class="card mb-4">
                        <div class="card-body">
                            <h5 class="card-title">Responses</h5>
                            <div id="responsesContainer">
                                <!-- Responses will be displayed here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <div class="d-flex justify-content-between mb-4">
                <button id="prevBtn" class="btn btn-secondary">Previous</button>
                <span id="itemCounter">Item 0 of 0</span>
                <button id="nextBtn" class="btn btn-secondary">Next</button>
            </div>

            <!-- Load More Button -->
            <div class="text-center mb-4">
                <button id="loadMoreBtn" class="btn btn-primary">Load More</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
